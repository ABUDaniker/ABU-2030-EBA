<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi-Planer ABU EBA HKO 2030</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary-dark: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #eef2f3; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-dark); border-bottom: 4px solid var(--accent); padding-bottom: 15px; }
        
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .btn-theme { padding: 18px; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; color: white; font-weight: bold; text-align: left; position: relative; overflow: hidden; }
        .btn-theme:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); filter: brightness(1.1); }
        .btn-theme.active { ring: 4px solid #333; outline: 3px solid white; outline-offset: -6px; }

        .content-area { display: none; padding: 30px; border-radius: 12px; margin-top: 25px; animation: slideUp 0.4s ease-out; color: white; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .info-card { background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        h2, h3 { margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 8px; }

        textarea { width: 100%; height: 130px; padding: 15px; border-radius: 8px; border: none; font-size: 1rem; margin-top: 10px; background: #fff; color: #222; }
        
        .action-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .feedback-panel { background: #fff; color: #333; padding: 20px; border-radius: 10px; border-left: 8px solid #f1c40f; display: none; }
        .skizze-panel { background: #f9f9f9; color: #333; padding: 20px; border-radius: 10px; border-left: 8px solid #27ae60; display: none; grid-column: span 2; margin-top: 20px; }

        .btn-main { padding: 12px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-check { background: #f1c40f; color: #222; }
        .btn-skizze { background: #27ae60; color: white; }
        .btn-pdf { background: #2c3e50; color: white; margin-top: 20px; }

        .step-box { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .step-title { font-weight: bold; color: #27ae60; text-transform: uppercase; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container">
    <h1>ABU EBA Planer 2030+</h1>
    <p style="text-align: center; color: #666;">Basierend auf dem Schullehrplan Kanton Zürich & HKO-Prinzipien</p>
    
    <div class="theme-grid" id="theme-buttons"></div>

    <div id="main-content" class="content-area">
        <h2 id="title"></h2>
        
        <div class="info-card">
            <h3>Leitidee (Erweitert)</h3>
            <p id="leitidee"></p>
        </div>

        <div class="info-card">
            <h3>Detaillierter HKO-Szenariovorschlag</h3>
            <p id="scenario-text" style="font-style: italic; font-size: 1.1em;"></p>
            <button class="btn-main" style="background: rgba(255,255,255,0.2); font-size: 0.8em;" onclick="refreshScenario()">Neuen Vorschlag generieren ↻</button>
        </div>

        <h3>Eigene Problemstellung präzisieren</h3>
        <textarea id="user-input" placeholder="Formulieren Sie hier Ihre komplexe Problemstellung aus der Ich-Perspektive..."></textarea>

        <div class="action-zone">
            <div>
                <button class="btn-main btn-check" onclick="analyzeHKO()">HKO-Tiefencheck & Produkte</button>
                <div id="feedback" class="feedback-panel"></div>
            </div>
            <div>
                <button class="btn-main btn-skizze" onclick="generateSkizze()">Unterrichtsskizze (3-6 Lekt.) erstellen</button>
            </div>
        </div>

        <div id="skizze-container" class="skizze-panel"></div>

        <button class="btn-main btn-pdf" onclick="saveAsPDF()">Komplette Planung als PDF exportieren</button>
    </div>
</div>

<script>
    const themes = {
        1: {
            title: "1. Ins Berufsleben einsteigen",
            color: "#2980b9",
            leitidee: "Übergang in eine neue Lebensphase. Anforderungen des Lehrbetriebs und der Berufsfachschule verstehen. Kommunikationsformen und Verhaltensregeln im Team beherrschen.",
            scenarios: [
                "Ich habe meine erste Woche im Betrieb hinter mir. Gestern gab es ein Missverständnis mit meinem Berufsbildner wegen einer Verspätung. Wie kommuniziere ich professionell, entschuldige mich korrekt und stelle sicher, dass meine Zuverlässigkeit nicht infrage gestellt wird?",
                "Mein Lehrvertrag enthält Klauseln zu Überstunden und Berufsschulbesuch, die ich nicht ganz verstehe. Ich möchte meine Rechte kennen, ohne beim Chef als 'schwierig' zu gelten. Wie bereite ich ein klärendes Gespräch vor?"
            ]
        },
        2: {
            title: "2. Bewusst konsumieren und handeln",
            color: "#27ae60",
            leitidee: "Zusammenhang zwischen Konsum, Finanzen und ökologischen Folgen. Budgetplanung und Vermeidung von Schuldenfallen (z.B. Kleinkredite, Leasing).",
            scenarios: [
                "Ich möchte unbedingt das neue iPhone, aber mein Lehrlingslohn reicht nicht aus. Ein Anbieter lockt mit '0% Finanzierung'. Ich analysiere mein Budget für die nächsten 12 Monate: Kann ich mir das wirklich leisten oder gerate ich in eine Schuldenfalle?",
                "Ich stelle fest, dass mein täglicher Coffee-to-go und das Mittagessen auswärts monatlich 300 CHF kosten. Ich suche nach nachhaltigen und günstigen Alternativen, um am Ende des Jahres eine Reise finanzieren zu können. Wie erstelle ich einen Sparplan?"
            ]
        },
        6: {
            title: "6. Verträge verstehen - fair handeln",
            color: "#16a085",
            leitidee: "Rechtliche Grundlagen im Alltag (Kauf, Miete, Arbeit). Formvorschriften und Rechtsfolgen von Vertragsverletzungen erkennen und handeln.",
            scenarios: [
                "Ich habe online ein Fitness-Abo abgeschlossen, das ich nun wegen Umzug kündigen will. Das Studio verweigert die Kündigung und pocht auf das Kleingedruckte. Wie prüfe ich die AGB rechtlich und verfasse einen eingeschriebenen Brief, um aus dem Vertrag zu kommen?",
                "Ich möchte mit Freunden eine WG gründen. Der Mietvertrag ist solidarisch. Was bedeutet das für mich, wenn ein Kollege seine Miete nicht zahlt? Ich erstelle eine Checkliste für unsere interne WG-Vereinbarung."
            ]
        }
        // Weitere Themen können nach gleichem Muster ergänzt werden
    };

    let activeId = null;

    // Initialisierung
    const grid = document.getElementById('theme-buttons');
    Object.keys(themes).forEach(id => {
        const btn = document.createElement('button');
        btn.className = 'btn-theme';
        btn.style.backgroundColor = themes[id].color;
        btn.innerHTML = themes[id].title;
        btn.onclick = () => selectTheme(id, btn);
        grid.appendChild(btn);
    });

    function selectTheme(id, btn) {
        activeId = id;
        document.querySelectorAll('.btn-theme').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const area = document.getElementById('main-content');
        area.style.display = 'block';
        area.style.backgroundColor = themes[id].color;
        
        document.getElementById('title').innerText = themes[id].title;
        document.getElementById('leitidee').innerText = themes[id].leitidee;
        refreshScenario();
        
        // Reset
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('skizze-container').style.display = 'none';
        document.getElementById('user-input').value = "";
    }

    function refreshScenario() {
        const scens = themes[activeId].scenarios;
        const randomScen = scens[Math.floor(Math.random() * scens.length)];
        document.getElementById('scenario-text').innerText = randomScen;
    }

    function analyzeHKO() {
        const input = document.getElementById('user-input').value;
        const feedback = document.getElementById('feedback');
        
        if(input.length < 10) { alert("Bitte formulieren Sie zuerst Ihre Problemstellung!"); return; }
        
        feedback.style.display = 'block';
        let html = "<h4>HKO-Analyse-Ergebnis:</h4><ul>";
        
        // Kriterienprüfung
        if(!input.toLowerCase().includes("ich")) html += "<li>❌ <b>Perspektive:</b> Die 'Ich-Form' fehlt. Machen Sie die Lernenden zum Akteur.</li>";
        else html += "<li>✅ <b>Perspektive:</b> Gute Personalisierung.</li>";
        
        if(!input.includes("?")) html += "<li>❌ <b>Offenheit:</b> Keine Frageform gefunden. HKO braucht eine Entscheidungssituation.</li>";
        
        if(input.length > 100) html += "<li>✅ <b>Komplexität:</b> Die Situation bietet genügend Tiefe für eine Ressourcenrecherche.</li>";
        else html += "<li>⚠️ <b>Komplexität:</b> Erweitern Sie die Situation um ein Hindernis oder einen Konflikt.</li>";

        html += "</ul><h4>Vorgeschlagene Handlungsprodukte:</h4>";
        html += "<ul><li><b>Präsentation:</b> Ein Pitch vor der Geschäftsleitung / Klasse.</li>";
        html += "<li><b>Dokument:</b> Ein begründeter Beschwerdebrief oder eine Budgettabelle.</li>";
        html += "<li><b>Digital:</b> Ein Erklärvideo (TikTok-Style) für andere Lernende.</li></ul>";
        
        feedback.innerHTML = html;
    }

    function generateSkizze() {
        const container = document.getElementById('skizze-container');
        container.style.display = 'block';
        
        const plan = [
            { s: "Informieren", t: "Ausgangslage analysieren: Was weiss ich bereits? Welche Infos fehlen mir zum Fall?" },
            { s: "Planen", t: "Vorgehen strukturieren: Recherchequellen festlegen (Gesetzestexte, KI, Experten)." },
            { s: "Entscheiden", t: "Lösungsweg wählen: Welche Option ist rechtlich/ethisch/finanziell am besten?" },
            { s: "Ausführen", t: "Produkt erstellen: Entwurf des Briefs, der Tabelle oder des Videos." },
            { s: "Kontrollieren", t: "Peer-Feedback: Gegenseitiges Prüfen der Ergebnisse anhand von Kriterien." },
            { s: "Reflektieren", t: "Transfer: Was bedeutet das Erlernte für meinen echten Alltag?" }
        ];

        let html = "<h4>Unterrichtsskizze (Vollständige Handlung)</h4>";
        plan.forEach(p => {
            html += `<div class="step-box"><span class="step-title">${p.s}:</span><br>${p.t}</div>`;
        });
        container.innerHTML = html;
    }

    function saveAsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Planung: " + themes[activeId].title, 10, 10);
        doc.text("Problemstellung:", 10, 20);
        doc.text(doc.splitTextToSize(document.getElementById('user-input').value, 180), 10, 30);
        // ... weitere Inhalte für PDF ...
        doc.save("ABU_EBA_Planung.pdf");
    }
</script>
</body>
</html>
